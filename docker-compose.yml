version: '3.8'

services:
  app:
    build: .
    container_name: comparei-servico-promer
    ports:
      - "8082:8082"
    depends_on:
      - db
      - mongo-promer
      - redis
    networks:
      - net_promer
      - comparei_net
    command:
      [
        "./wait-for-it.sh", "db:3306", "--",
        "./wait-for-it.sh", "mongo-promer:27017", "--",
        "./main"
      ]
    volumes:
      - ./tmp:/app/tmp
    mem_limit: 512m
    cpus: 0.5

  db:
    image: mysql:8
    container_name: mysql_promer
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: promerdb
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - net_promer
    mem_limit: 512m
    cpus: 0.5

  mongo-promer:
    image: mongo:latest
    container_name: mongo-promer
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: promerdb
      MONGO_INITDB_DATABASE: promerdb
    volumes:
      - ./data/mongo:/data/db
    networks:
      - net_promer
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"
  redis:
    image: redis:7
    container_name: redis_promer
    command: redis-server --appendonly yes
    volumes:
      - ./data/redis:/data
    networks:
      - net_promer
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "768M"
          
networks:
  net_promer:
    driver: bridge
  
  comparei_net:
    external: true
